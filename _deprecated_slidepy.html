<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlidePy — Presentations with Python</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
<style>
:root {
  --bg-app: #0e0e12;
  --bg-panel: #16161d;
  --bg-slide: #1c1c26;
  --bg-card: #22222e;
  --bg-hover: #2a2a38;
  --bg-active: #32324a;
  --accent: #7c6cf0;
  --accent-glow: rgba(124,108,240,0.25);
  --accent-bright: #9d8fff;
  --green: #4ade80;
  --green-glow: rgba(74,222,128,0.2);
  --red: #f87171;
  --orange: #fb923c;
  --yellow: #facc15;
  --cyan: #22d3ee;
  --text-primary: #e8e6f0;
  --text-secondary: #9896a8;
  --text-muted: #5e5c6e;
  --border: #2a2a3a;
  --border-accent: #3a3a5a;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --transition: 180ms ease;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg-app); color:var(--text-primary); overflow:hidden; height:100vh; }

.topbar { display:flex; align-items:center; justify-content:space-between; height:52px; padding:0 16px; background:var(--bg-panel); border-bottom:1px solid var(--border); z-index:100; }
.topbar-left { display:flex; align-items:center; gap:14px; }
.logo { font-family:'Playfair Display',serif; font-size:20px; font-weight:800; background:linear-gradient(135deg,var(--accent-bright),var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.logo-icon { width:28px; height:28px; background:linear-gradient(135deg,var(--accent),var(--cyan)); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:14px; color:#fff; font-weight:700; }
.pres-title { background:transparent; border:1px solid transparent; color:var(--text-primary); font-size:14px; font-family:'DM Sans',sans-serif; padding:4px 10px; border-radius:var(--radius-sm); transition:var(--transition); min-width:200px; }
.pres-title:hover { border-color:var(--border); }
.pres-title:focus { outline:none; border-color:var(--accent); background:var(--bg-card); }
.topbar-center,.topbar-right { display:flex; align-items:center; gap:2px; }
.topbar-right { gap:8px; }

.tb-btn { background:transparent; border:none; color:var(--text-secondary); padding:6px 12px; border-radius:var(--radius-sm); cursor:pointer; font-size:13px; font-family:'DM Sans',sans-serif; transition:var(--transition); display:flex; align-items:center; gap:6px; }
.tb-btn:hover { background:var(--bg-hover); color:var(--text-primary); }
.tb-sep { width:1px; height:20px; background:var(--border); margin:0 6px; }

.btn-share { background:linear-gradient(135deg,var(--accent),#6355d8); border:none; color:#fff; padding:6px 16px; border-radius:var(--radius-sm); cursor:pointer; font-size:13px; font-weight:600; font-family:'DM Sans',sans-serif; transition:var(--transition); display:flex; align-items:center; gap:6px; }
.btn-share:hover { filter:brightness(1.15); transform:translateY(-1px); box-shadow:0 4px 16px var(--accent-glow); }
.btn-present { background:linear-gradient(135deg,var(--green),#22c55e); border:none; color:#0a2e14; padding:6px 16px; border-radius:var(--radius-sm); cursor:pointer; font-size:13px; font-weight:700; font-family:'DM Sans',sans-serif; transition:var(--transition); display:flex; align-items:center; gap:6px; }
.btn-present:hover { filter:brightness(1.1); transform:translateY(-1px); box-shadow:0 4px 16px var(--green-glow); }

.main-layout { display:flex; height:calc(100vh - 52px); }

.sidebar { width:220px; min-width:220px; background:var(--bg-panel); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.sidebar-header { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; border-bottom:1px solid var(--border); }
.sidebar-header span { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); }
.sidebar-actions { display:flex; gap:4px; }
.sidebar-actions button { background:transparent; border:1px solid var(--border); color:var(--text-secondary); width:26px; height:26px; border-radius:var(--radius-sm); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:var(--transition); }
.sidebar-actions button:hover { background:var(--accent); border-color:var(--accent); color:#fff; }

.slide-list { flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:6px; }
.slide-list::-webkit-scrollbar { width:4px; }
.slide-list::-webkit-scrollbar-thumb { background:var(--border-accent); border-radius:4px; }

.slide-thumb { position:relative; background:var(--bg-card); border:2px solid transparent; border-radius:var(--radius-sm); padding:6px; cursor:pointer; transition:var(--transition); display:flex; align-items:center; gap:8px; }
.slide-thumb:hover { background:var(--bg-hover); border-color:var(--border-accent); }
.slide-thumb.active { border-color:var(--accent); background:var(--bg-active); }
.slide-thumb.hidden-slide { opacity:0.45; }
.slide-thumb-num { font-size:10px; font-weight:700; color:var(--text-muted); min-width:18px; text-align:center; }
.slide-thumb-preview { flex:1; font-size:11px; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.slide-thumb-icons { display:flex; gap:3px; align-items:center; }
.badge { font-size:9px; padding:1px 5px; border-radius:3px; font-weight:600; }
.badge-py { background:rgba(74,222,128,0.15); color:var(--green); }
.badge-hidden { background:rgba(248,113,113,0.15); color:var(--red); }
.slide-ctx-menu { position:absolute; right:4px; top:4px; background:transparent; border:none; color:var(--text-muted); cursor:pointer; font-size:14px; opacity:0; transition:var(--transition); padding:2px 4px; border-radius:3px; }
.slide-thumb:hover .slide-ctx-menu { opacity:1; }
.slide-thumb.dragging { opacity:0.3; }
.slide-thumb.drag-over { border-top:2px solid var(--accent); }

.editor-area { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg-app); }
.editor-toolbar { display:flex; align-items:center; padding:8px 16px; gap:4px; border-bottom:1px solid var(--border); background:var(--bg-panel); flex-wrap:wrap; }
.et-group { display:flex; align-items:center; gap:2px; }
.et-btn { background:transparent; border:none; color:var(--text-secondary); padding:5px 10px; border-radius:var(--radius-sm); cursor:pointer; font-size:12px; font-family:'DM Sans',sans-serif; transition:var(--transition); }
.et-btn:hover { background:var(--bg-hover); color:var(--text-primary); }
.et-sep { width:1px; height:20px; background:var(--border); margin:0 8px; }
.et-select { background:var(--bg-card); border:1px solid var(--border); color:var(--text-primary); padding:4px 8px; border-radius:var(--radius-sm); font-size:12px; font-family:'DM Sans',sans-serif; cursor:pointer; }

.slide-canvas-wrapper { flex:1; display:flex; align-items:center; justify-content:center; padding:24px; overflow:auto; position:relative; }
.slide-canvas { width:960px; height:540px; background:var(--bg-slide); border-radius:var(--radius); box-shadow:var(--shadow),0 0 0 1px var(--border); position:relative; overflow:hidden; }

/* FREE-POSITION ELEMENTS */
.slide-element-free { position:absolute; user-select:none; min-width:60px; min-height:30px; }
.slide-element-free:hover > .el-actions-free { opacity:1; }
.slide-element-free.selected > .sel-border { position:absolute; inset:-1px; border:2px solid var(--accent); border-radius:var(--radius-sm); pointer-events:none; z-index:5; }
.slide-element-free.dragging-el { opacity:0.7; cursor:grabbing; z-index:100; }

.el-actions-free { position:absolute; top:-30px; right:0; display:flex; gap:2px; opacity:0; transition:var(--transition); z-index:60; }
.el-actions-free button { width:22px; height:22px; border-radius:4px; border:none; background:var(--bg-card); color:var(--text-secondary); cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; transition:var(--transition); box-shadow:0 2px 8px rgba(0,0,0,0.3); }
.el-actions-free button:hover { background:var(--red); color:#fff; }

.resize-handle { position:absolute; width:14px; height:14px; bottom:-2px; right:-2px; cursor:nwse-resize; z-index:55; }
.resize-handle::after { content:''; position:absolute; bottom:3px; right:3px; width:8px; height:8px; border-right:2px solid var(--accent-bright); border-bottom:2px solid var(--accent-bright); opacity:0.4; }
.slide-element-free:hover .resize-handle::after,.slide-element-free.selected .resize-handle::after { opacity:1; }

/* DRAG HEADER */
.drag-header { height:16px; cursor:grab; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 150ms; border-radius:var(--radius-sm) var(--radius-sm) 0 0; }
.slide-element-free:hover .drag-header,.slide-element-free.selected .drag-header { opacity:1; }
.drag-header .dots { width:24px; height:4px; background:radial-gradient(circle,var(--text-muted) 1px,transparent 1px); background-size:6px 4px; }

/* TEXT ELEMENT */
.text-element-box { width:100%; height:calc(100% - 16px); border-radius:var(--radius-sm); overflow:hidden; display:flex; flex-direction:column; }
.text-element-content { flex:1; padding:10px 14px; outline:none; font-family:'DM Sans',sans-serif; color:var(--text-primary); line-height:1.5; word-wrap:break-word; overflow-y:auto; }
.text-element-content:focus { background:rgba(124,108,240,0.03); }
.text-element-content.title-el { font-family:'Playfair Display',serif; font-size:36px; font-weight:800; line-height:1.2; }
.text-element-content.subtitle-el { font-size:20px; color:var(--text-secondary); }
.text-element-content.body-el { font-size:16px; }
.text-element-content ul,.text-element-content ol { padding-left:22px; margin:4px 0; }

/* FLOATING TEXT TOOLBAR */
.text-toolbar { position:absolute; top:-44px; left:0; display:flex; gap:1px; background:var(--bg-panel); border:1px solid var(--border); border-radius:8px; padding:3px 4px; box-shadow:0 8px 32px rgba(0,0,0,0.5); z-index:200; opacity:0; pointer-events:none; transition:opacity 150ms; align-items:center; white-space:nowrap; }
.text-toolbar.visible { opacity:1; pointer-events:auto; }

.tt-btn { background:transparent; border:none; color:var(--text-secondary); padding:4px 7px; border-radius:4px; cursor:pointer; font-size:12px; transition:var(--transition); display:flex; align-items:center; justify-content:center; min-width:26px; height:26px; font-family:'DM Sans',sans-serif; }
.tt-btn:hover { background:var(--bg-hover); color:var(--text-primary); }
.tt-btn.active { background:var(--accent); color:#fff; }
.tt-sep { width:1px; height:18px; background:var(--border); margin:0 3px; flex-shrink:0; }
.tt-select { background:var(--bg-card); border:1px solid var(--border); color:var(--text-primary); padding:2px 4px; border-radius:4px; font-size:11px; font-family:'DM Sans',sans-serif; cursor:pointer; height:26px; }
.tt-color-input { width:26px; height:26px; border:1px solid var(--border); border-radius:4px; cursor:pointer; background:transparent; padding:0; }
.tt-color-input::-webkit-color-swatch-wrapper { padding:2px; }
.tt-color-input::-webkit-color-swatch { border:none; border-radius:3px; }

/* STYLE PANEL */
.style-panel { position:absolute; bottom:-38px; left:0; display:flex; gap:4px; background:var(--bg-panel); border:1px solid var(--border); border-radius:8px; padding:3px 6px; box-shadow:0 8px 32px rgba(0,0,0,0.5); z-index:200; opacity:0; pointer-events:none; transition:opacity 150ms; align-items:center; white-space:nowrap; }
.style-panel.visible { opacity:1; pointer-events:auto; }
.sp-label { font-size:10px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; margin-right:2px; }
.sp-color-input { width:22px; height:22px; border:1px solid var(--border); border-radius:4px; cursor:pointer; background:transparent; padding:0; }
.sp-color-input::-webkit-color-swatch-wrapper { padding:2px; }
.sp-color-input::-webkit-color-swatch { border:none; border-radius:3px; }
.sp-select { background:var(--bg-card); border:1px solid var(--border); color:var(--text-primary); padding:1px 5px; border-radius:4px; font-size:11px; font-family:'DM Sans',sans-serif; cursor:pointer; height:22px; }

/* JUPYTER CELL */
.jupyter-cell { display:flex; gap:0; border-radius:var(--radius); overflow:hidden; border:1px solid var(--border); background:var(--bg-card); width:100%; height:calc(100% - 16px); min-height:180px; }
.cell-code-side { flex:1; display:flex; flex-direction:column; border-right:1px solid var(--border); min-width:0; }
.cell-code-header { display:flex; align-items:center; justify-content:space-between; padding:6px 12px; background:rgba(124,108,240,0.08); border-bottom:1px solid var(--border); }
.cell-code-label { display:flex; align-items:center; gap:6px; font-size:11px; font-weight:600; color:var(--accent-bright); }
.py-dot { width:8px; height:8px; background:var(--green); border-radius:50%; box-shadow:0 0 6px var(--green-glow); }
.run-btn { background:var(--green); border:none; color:#0a2e14; padding:4px 14px; border-radius:var(--radius-sm); cursor:pointer; font-size:11px; font-weight:700; font-family:'DM Sans',sans-serif; display:flex; align-items:center; gap:5px; transition:var(--transition); }
.run-btn:hover { filter:brightness(1.15); transform:translateY(-1px); }
.run-btn:disabled { opacity:0.5; cursor:wait; }
.spinner { width:12px; height:12px; border:2px solid rgba(0,0,0,0.2); border-top-color:#0a2e14; border-radius:50%; animation:spin .6s linear infinite; display:inline-block; }
@keyframes spin { to { transform:rotate(360deg); } }
.cell-code-editor { flex:1; overflow:auto; }
.cell-code-editor .CodeMirror { height:100%; min-height:100px; font-family:'JetBrains Mono',monospace; font-size:13px; line-height:1.6; background:#1a1a28; }
.cell-output-side { flex:1; display:flex; flex-direction:column; min-width:0; }
.cell-output-header { display:flex; align-items:center; justify-content:space-between; padding:6px 12px; background:rgba(74,222,128,0.06); border-bottom:1px solid var(--border); }
.cell-output-label { font-size:11px; font-weight:600; color:var(--green); display:flex; align-items:center; gap:6px; }
.clear-output-btn { background:transparent; border:1px solid var(--border); color:var(--text-muted); padding:2px 10px; border-radius:4px; cursor:pointer; font-size:10px; font-weight:600; font-family:'DM Sans',sans-serif; transition:var(--transition); }
.clear-output-btn:hover { border-color:var(--red); color:var(--red); background:rgba(248,113,113,0.08); }
.cell-output-content { flex:1; padding:12px; font-family:'JetBrains Mono',monospace; font-size:13px; line-height:1.6; overflow:auto; white-space:pre-wrap; color:var(--text-primary); }
.cell-output-content .error { color:var(--red); }
.cell-output-content img { max-width:100%; border-radius:var(--radius-sm); margin:4px 0; }

/* IMAGE */
.image-element { border-radius:var(--radius-sm); border:2px dashed var(--border); width:100%; height:calc(100% - 16px); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; color:var(--text-muted); font-size:13px; cursor:pointer; transition:var(--transition); overflow:hidden; }
.image-element:hover { border-color:var(--accent); color:var(--accent-bright); }
.image-element img { width:100%; height:100%; object-fit:contain; }
.image-element.has-image { border-style:solid; border-color:transparent; padding:0; }

/* CONTEXT MENU */
.context-menu { position:fixed; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:6px; box-shadow:var(--shadow); z-index:1000; min-width:180px; display:none; }
.context-menu.show { display:block; }
.ctx-item { display:flex; align-items:center; gap:10px; padding:7px 12px; border-radius:var(--radius-sm); cursor:pointer; font-size:13px; color:var(--text-secondary); transition:var(--transition); border:none; background:none; width:100%; text-align:left; font-family:'DM Sans',sans-serif; }
.ctx-item:hover { background:var(--bg-hover); color:var(--text-primary); }
.ctx-item.danger:hover { background:rgba(248,113,113,0.15); color:var(--red); }
.ctx-sep { height:1px; background:var(--border); margin:4px 8px; }

/* MODALS */
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; z-index:2000; opacity:0; pointer-events:none; transition:opacity 250ms ease; }
.modal-overlay.show { opacity:1; pointer-events:auto; }
.modal { background:var(--bg-panel); border:1px solid var(--border); border-radius:14px; padding:28px; max-width:480px; width:90%; box-shadow:0 24px 80px rgba(0,0,0,0.5); transform:translateY(10px); transition:transform 250ms ease; }
.modal-overlay.show .modal { transform:translateY(0); }
.modal h2 { font-family:'Playfair Display',serif; font-size:22px; margin-bottom:6px; }
.modal p { color:var(--text-secondary); font-size:14px; margin-bottom:18px; }
.modal-input { width:100%; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 14px; color:var(--text-primary); font-family:'JetBrains Mono',monospace; font-size:13px; margin-bottom:14px; }
.modal-input:focus { outline:none; border-color:var(--accent); }
.modal-btns { display:flex; justify-content:flex-end; gap:8px; }
.modal-btn { padding:8px 18px; border-radius:var(--radius-sm); border:1px solid var(--border); background:transparent; color:var(--text-secondary); font-size:13px; font-family:'DM Sans',sans-serif; cursor:pointer; transition:var(--transition); }
.modal-btn:hover { background:var(--bg-hover); color:var(--text-primary); }
.modal-btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }
.modal-btn.primary:hover { filter:brightness(1.15); }

.pyodide-status { position:fixed; bottom:16px; right:16px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:8px 14px; font-size:12px; color:var(--text-secondary); display:flex; align-items:center; gap:8px; z-index:500; box-shadow:var(--shadow); }
.pyodide-status .dot { width:8px; height:8px; border-radius:50%; background:var(--orange); transition:background 400ms; }
.pyodide-status.ready .dot { background:var(--green); box-shadow:0 0 8px var(--green-glow); }
.pyodide-status.error .dot { background:var(--red); }

.upload-zone { margin-top:12px; border:2px dashed var(--border); border-radius:var(--radius); padding:20px; text-align:center; color:var(--text-muted); font-size:13px; cursor:pointer; transition:var(--transition); }
.upload-zone:hover { border-color:var(--accent); color:var(--accent-bright); }
.uploaded-files-list { margin-top:10px; display:flex; flex-direction:column; gap:4px; }
.uploaded-file-item { display:flex; align-items:center; justify-content:space-between; padding:6px 10px; background:var(--bg-card); border-radius:var(--radius-sm); font-size:12px; font-family:'JetBrains Mono',monospace; }
.uploaded-file-item button { background:none; border:none; color:var(--red); cursor:pointer; font-size:14px; }

.toast { position:fixed; bottom:60px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--bg-card); border:1px solid var(--accent); color:var(--text-primary); padding:10px 20px; border-radius:var(--radius); font-size:13px; z-index:3000; box-shadow:0 8px 32px rgba(0,0,0,0.5); opacity:0; pointer-events:none; transition:all 300ms ease; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

.slide-bottom-bar { display:flex; align-items:center; justify-content:center; padding:10px; gap:8px; }
.slide-counter { font-size:12px; color:var(--text-muted); font-weight:600; }

/* PRESENTING */
body.presenting .topbar,body.presenting .sidebar,body.presenting .editor-toolbar { display:none; }
body.presenting .main-layout { height:100vh; }
body.presenting .slide-canvas-wrapper { padding:0; }
body.presenting .slide-canvas { width:100vw; height:100vh; border-radius:0; box-shadow:none; }
body.presenting .el-actions-free,body.presenting .resize-handle,body.presenting .text-toolbar,body.presenting .style-panel,body.presenting .sel-border,body.presenting .drag-header { display:none !important; }
body.presenting .slide-element-free { cursor:default; }
body.presenting .text-element-content { cursor:default; }
body.presenting .text-element-box { height:100% !important; }
body.presenting .jupyter-cell { height:100% !important; }
body.presenting .present-nav { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:8px; background:rgba(22,22,29,0.9); padding:8px 16px; border-radius:30px; border:1px solid var(--border); z-index:10000; opacity:0; transition:opacity 300ms; }
body.presenting:hover .present-nav { opacity:1; }
body.presenting .present-nav button { background:var(--bg-hover); border:none; color:var(--text-primary); padding:6px 14px; border-radius:20px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px; transition:var(--transition); }
body.presenting .present-nav button:hover { background:var(--accent); }
body.presenting .slide-bottom-bar { display:none; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-icon">Sp</div>
    <span class="logo">SlidePy</span>
    <input class="pres-title" id="presTitle" value="Untitled Presentation" spellcheck="false">
  </div>
  <div class="topbar-center">
    <button class="tb-btn" onclick="undo()">↩ Undo</button>
    <button class="tb-btn" onclick="redo()">↪ Redo</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="openUploadModal()">📦 Upload .py</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="exportJSON()">💾 Save</button>
    <button class="tb-btn" onclick="triggerLoad()">📂 Load</button>

  </div>
  <div class="topbar-right">
    <button class="btn-share" onclick="openShareModal()">🔗 Share</button>

</div>

<div class="main-layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Slides</span>

        <button onclick="addSlide('blank')" title="Blank slide">+</button>

    <h2>Upload Python Files</h2>

    <input type="file" id="pyFileInput" accept=".py" multiple style="display:none" onchange="handlePyUpload(event)">
    <div class="uploaded-files-list" id="uploadedFilesList"></div>

<div class="pyodide-status" id="pyStatus"><div class="dot"></div><span id="pyStatusText">Loading Python...</span></div>
<div class="toast" id="toast"></div>

<script>
// ═══════ STATE ═══════
let slides = [], currentSlideIdx = 0, pyodide = null, pyReady = false;
let uploadedPyFiles = {}, codeMirrors = {}, ctxSlideIdx = -1;
let undoStack = [], redoStack = [], selectedElIdx = -1;

function init() {
  addSlide('title');
  slides[0].elements = [
    { type:'title', content:'Welcome to <b>SlidePy</b>', x:40, y:120, w:440, h:100, borderColor:'', bgColor:'', borderWidth:0, _bgHex:'#22222e', _bgAlpha:0 },
    { type:'subtitle', content:'Presentations powered by Python', x:40, y:240, w:440, h:60, borderColor:'', bgColor:'', borderWidth:0, _bgHex:'#22222e', _bgAlpha:0 }
  ];
  renderSidebar(); renderSlide(); initPyodide(); setupDropZone();
}

// ═══════ PYODIDE ═══════
async function initPyodide() {
  try {
    pyodide = await loadPyodide({ indexURL:"https://cdn.jsdelivr.net/pyodide/v0.24.1/full/" });
    await pyodide.loadPackage(['matplotlib','numpy']);
    pyodide.runPython(`import sys,io\nimport matplotlib\nmatplotlib.use('AGG')\nimport matplotlib.pyplot as plt\nimport numpy as np`);
    pyReady = true;
    document.getElementById('pyStatus').classList.add('ready');
    document.getElementById('pyStatusText').textContent = 'Python ready';
  } catch(e) {
    document.getElementById('pyStatus').classList.add('error');
    document.getElementById('pyStatusText').textContent = 'Python failed';
  }
}

// ═══════ UNDO ═══════
function saveUndo() { persistAll(); undoStack.push(JSON.stringify(slides)); if(undoStack.length>50) undoStack.shift(); redoStack=[]; }
function undo() { if(!undoStack.length) return; redoStack.push(JSON.stringify(slides)); slides=JSON.parse(undoStack.pop()); if(currentSlideIdx>=slides.length) currentSlideIdx=slides.length-1; selectedElIdx=-1; renderSidebar(); renderSlide(); }
function redo() { if(!redoStack.length) return; undoStack.push(JSON.stringify(slides)); slides=JSON.parse(redoStack.pop()); selectedElIdx=-1; renderSidebar(); renderSlide(); }

function genId() { return 's'+Date.now()+Math.random().toString(36).substr(2,5); }

// ═══════ SLIDES ═══════
function addSlide(type) {
  saveUndo();
  const s = { id:genId(), type, elements:[], bg:'#1c1c26', hidden:false };
  if (type==='title') {
    s.elements = [
      { type:'title', content:'Click to add title', x:40, y:140, w:440, h:90, borderColor:'', bgColor:'', borderWidth:0, _bgHex:'#22222e', _bgAlpha:0 },
      { type:'subtitle', content:'Click to add subtitle', x:40, y:250, w:440, h:50, borderColor:'', bgColor:'', borderWidth:0, _bgHex:'#22222e', _bgAlpha:0 }
    ];
  } else if (type==='jupyter') {
    s.elements = [{ type:'jupyter', code:'# Python here\nprint("Hello!")', output:'', x:16, y:16, w:928, h:500, borderColor:'', bgColor:'', borderWidth:0, _bgHex:'#22222e', _bgAlpha:0 }];
  }
  slides.push(s); currentSlideIdx=slides.length-1; selectedElIdx=-1;
  renderSidebar(); renderSlide();
}
function selectSlide(i) { persistAll(); currentSlideIdx=i; selectedElIdx=-1; renderSidebar(); renderSlide(); }
function deleteSlide(i) { if(slides.length<=1)return; saveUndo(); slides.splice(i,1); if(currentSlideIdx>=slides.length) currentSlideIdx=slides.length-1; selectedElIdx=-1; renderSidebar(); renderSlide(); }
function duplicateSlide(i) { saveUndo(); const c=JSON.parse(JSON.stringify(slides[i])); c.id=genId(); slides.splice(i+1,0,c); currentSlideIdx=i+1; renderSidebar(); renderSlide(); }
function toggleHidden(i) { saveUndo(); slides[i].hidden=!slides[i].hidden; renderSidebar(); renderSlide(); }
function moveSlide(i,d) { const n=i+d; if(n<0||n>=slides.length)return; saveUndo(); [slides[i],slides[n]]=[slides[n],slides[i]]; currentSlideIdx=n; renderSidebar(); renderSlide(); }

// ═══════ ELEMENTS ═══════
const elDefaults = { borderColor:'', bgColor:'', borderWidth:0, _bgHex:'#22222e', _bgAlpha:0 };
function addElement(type) {
  saveUndo();
  const els = slides[currentSlideIdx].elements;
  const y = 40 + (els.length % 5) * 70;
  if (type==='title') els.push({ type:'title', content:'Title', x:40, y, w:440, h:80, ...elDefaults });
  else if (type==='subtitle') els.push({ type:'subtitle', content:'Subtitle', x:40, y, w:440, h:50, ...elDefaults });
  else if (type==='body') els.push({ type:'body', content:'Body text', x:40, y, w:400, h:60, ...elDefaults });
  else if (type==='image') els.push({ type:'image', src:'', x:500, y:40, w:400, h:300, ...elDefaults });
  else if (type==='jupyter') els.push({ type:'jupyter', code:'# Python\n', output:'', x:16, y:16, w:928, h:480, ...elDefaults });
  selectedElIdx = els.length-1;
  renderSlide();
}
function removeElement(i) { saveUndo(); slides[currentSlideIdx].elements.splice(i,1); selectedElIdx=-1; renderSlide(); }
function duplicateElement(i) {
  saveUndo();
  const el = JSON.parse(JSON.stringify(slides[currentSlideIdx].elements[i]));
  el.x = Math.min(el.x+20, 960-el.w); el.y = Math.min(el.y+20, 540-el.h);
  slides[currentSlideIdx].elements.push(el);
  selectedElIdx = slides[currentSlideIdx].elements.length-1;
  renderSlide();
}

function persistAll() {
  const slide = slides[currentSlideIdx]; if(!slide) return;
  slide.elements.forEach((el, i) => {
    if (el.type==='jupyter') { const cm=codeMirrors[`cm_${currentSlideIdx}_${i}`]; if(cm) el.code=cm.getValue(); }
    const ce = document.querySelector(`[data-el-idx="${i}"] .text-element-content`);
    if (ce && (el.type==='title'||el.type==='subtitle'||el.type==='body')) el.content = ce.innerHTML;
  });
}

function onCanvasMouseDown(e) {
  if (e.target.id==='slideCanvas') { if(selectedElIdx!==-1){ selectedElIdx=-1; renderSlide(); } }
}

// ═══════ RENDER ═══════
function renderSidebar() {
  const list = document.getElementById('slideList'); list.innerHTML = '';
  slides.forEach((s,i) => {
    const hasPy = s.elements.some(e=>e.type==='jupyter');
    const t = document.createElement('div');
    t.className = 'slide-thumb'+(i===currentSlideIdx?' active':'')+(s.hidden?' hidden-slide':'');
    t.draggable = true;
    t.onclick = ()=>selectSlide(i);
    t.oncontextmenu = (e)=>{e.preventDefault();showCtxMenu(e,i);};
    t.ondragstart = (e)=>{e.dataTransfer.setData('text/plain',i);t.classList.add('dragging');};
    t.ondragend = ()=>t.classList.remove('dragging');
    t.ondragover = (e)=>{e.preventDefault();t.classList.add('drag-over');};
    t.ondragleave = ()=>t.classList.remove('drag-over');
    t.ondrop = (e)=>{e.preventDefault();t.classList.remove('drag-over');const from=parseInt(e.dataTransfer.getData('text/plain')),to=i;if(from===to)return;saveUndo();const[m]=slides.splice(from,1);slides.splice(to,0,m);currentSlideIdx=to;renderSidebar();renderSlide();};
    let preview='';
    const te=s.elements.find(e=>e.type==='title');
    if(te) preview=te.content.replace(/<[^>]+>/g,''); else if(hasPy) preview='🐍 Python Slide'; else preview='Blank Slide';
    t.innerHTML = `<span class="slide-thumb-num">${i+1}</span><span class="slide-thumb-preview">${escHtml(preview)}</span><span class="slide-thumb-icons">${hasPy?'<span class="badge badge-py">PY</span>':''}${s.hidden?'<span class="badge badge-hidden">H</span>':''}</span><button class="slide-ctx-menu" onclick="event.stopPropagation();showCtxMenu(event,${i})">⋯</button>`;
    list.appendChild(t);
  });
  document.getElementById('slideCounter').textContent = `Slide ${currentSlideIdx+1} of ${slides.length}`;
}

function renderSlide() {
  codeMirrors = {};
  const slide = slides[currentSlideIdx];
  const canvas = document.getElementById('slideCanvas');
  canvas.style.background = slide.bg; canvas.innerHTML = '';
  if (slide.hidden && !document.body.classList.contains('presenting')) {
    const b = document.createElement('div');
    b.style.cssText='position:absolute;top:12px;right:12px;background:rgba(248,113,113,0.15);color:var(--red);font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;z-index:200;';
    b.textContent='HIDDEN SLIDE'; canvas.appendChild(b);
  }
  const isLight = isLightColor(slide.bg);
  slide.elements.forEach((el, idx) => {
    const w = document.createElement('div');
    w.className = 'slide-element-free'+(idx===selectedElIdx?' selected':'');
    w.dataset.elIdx = idx;
    w.style.cssText = `left:${el.x||0}px;top:${el.y||0}px;width:${el.w||300}px;height:${el.h||80}px;z-index:${idx===selectedElIdx?50:idx+1};`;

    if (idx===selectedElIdx) { const sb=document.createElement('div'); sb.className='sel-border'; w.appendChild(sb); }

    w.innerHTML += `<div class="el-actions-free"><button onclick="event.stopPropagation();duplicateElement(${idx})" title="Duplicate" style="background:var(--bg-card)">📋</button><button onclick="event.stopPropagation();removeElement(${idx})" title="Remove">✕</button></div>`;

    // Drag header
    const dh = document.createElement('div'); dh.className='drag-header';
    dh.innerHTML='<span class="dots"></span>';
    dh.addEventListener('mousedown',(e)=>{e.preventDefault();selectEl(idx);startDrag(e,idx);});
    w.appendChild(dh);

    // Resize
    const rh = document.createElement('div'); rh.className='resize-handle';
    rh.addEventListener('mousedown',(e)=>startResize(e,idx));
    w.appendChild(rh);

    if (el.type==='title'||el.type==='subtitle'||el.type==='body') renderTextEl(w,el,idx,isLight);
    else if (el.type==='image') renderImageEl(w,el,idx);
    else if (el.type==='jupyter') renderJupyterEl(w,el,idx);
    canvas.appendChild(w);
  });
}

function renderTextEl(w,el,idx,isLight) {
  const box = document.createElement('div'); box.className='text-element-box';
  if(el.borderColor && el.borderWidth) box.style.border=`${el.borderWidth}px solid ${el.borderColor}`;
  if(el.bgColor) box.style.background=el.bgColor;
  box.style.borderRadius='var(--radius-sm)';

  const c = document.createElement('div');
  c.className=`text-element-content ${el.type}-el`;
  c.contentEditable=true; c.innerHTML=el.content;
  if(isLight && !el.bgColor) c.style.color='#1a1a2e';
  c.addEventListener('focus',()=>{ selectEl(idx); });
  c.addEventListener('input',()=>{ slides[currentSlideIdx].elements[idx].content=c.innerHTML; renderSidebar(); });
  c.addEventListener('mouseup',()=>setTimeout(updateTbState,10));
  c.addEventListener('keyup',()=>setTimeout(updateTbState,10));
  box.appendChild(c); w.appendChild(box);

  if (idx===selectedElIdx) {
    const tb = mkTextToolbar(idx); w.appendChild(tb);
    const sp = mkStylePanel(idx,el); w.appendChild(sp);
    setTimeout(()=>{ tb.classList.add('visible'); sp.classList.add('visible'); },20);
  }
}

function renderImageEl(w,el,idx) {
  const d = document.createElement('div');
  d.className='image-element'+(el.src?' has-image':'');
  if(el.src) d.innerHTML=`<img src="${el.src}">`; else d.innerHTML='📷 Click to upload';
  d.onclick=()=>{ if(el.src)return; const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
    inp.onchange=(ev)=>{ const f=ev.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=(re)=>{slides[currentSlideIdx].elements[idx].src=re.target.result;renderSlide();}; r.readAsDataURL(f); };
    inp.click(); };
  w.appendChild(d);
}

function renderJupyterEl(w,el,idx) {
  const cmId=`cm_${currentSlideIdx}_${idx}`;
  const cell=document.createElement('div'); cell.className='jupyter-cell';
  cell.innerHTML=`<div class="cell-code-side"><div class="cell-code-header"><span class="cell-code-label"><span class="py-dot"></span>Python</span><button class="run-btn" id="runBtn_${idx}" onclick="event.stopPropagation();runCell(${idx})">▶ Run</button></div><div class="cell-code-editor" id="editor_${cmId}"></div></div><div class="cell-output-side"><div class="cell-output-header"><span class="cell-output-label">⬡ Output</span><button class="clear-output-btn" onclick="event.stopPropagation();clearOutput(${idx})">✕ Clear</button></div><div class="cell-output-content" id="output_${idx}">${el.output||'<span style="color:var(--text-muted)">Run code to see output...</span>'}</div></div>`;
  w.appendChild(cell);
  requestAnimationFrame(()=>{
    const ee=document.getElementById(`editor_${cmId}`); if(!ee)return;
    const cm=CodeMirror(ee,{ value:el.code||'', mode:'python', theme:'dracula', lineNumbers:true, indentUnit:4, tabSize:4, indentWithTabs:false, lineWrapping:true,
      extraKeys:{'Shift-Enter':()=>runCell(idx),'Tab':(cm)=>cm.replaceSelection('    ')} });
    codeMirrors[cmId]=cm; setTimeout(()=>cm.refresh(),50);
  });
}

// ═══════ TEXT TOOLBAR ═══════
function mkTextToolbar(idx) {
  const tb=document.createElement('div'); tb.className='text-toolbar'; tb.id=`ttb_${idx}`;
  tb.innerHTML=`
    <button class="tt-btn" onmousedown="event.preventDefault();xCmd('bold')" title="Bold"><b style="font-size:13px">B</b></button>
    <button class="tt-btn" onmousedown="event.preventDefault();xCmd('italic')" title="Italic"><i style="font-size:12px">I</i></button>
    <button class="tt-btn" onmousedown="event.preventDefault();xCmd('underline')" title="Underline" style="text-decoration:underline">U</button>
    <div class="tt-sep"></div>
    <select class="tt-select" onchange="xCmd('fontSize',this.value);this.selectedIndex=0" title="Font size">
      <option value="">Size</option><option value="1">10</option><option value="2">13</option><option value="3">16</option><option value="4">18</option><option value="5">24</option><option value="6">32</option><option value="7">48</option>
    </select>
    <input type="color" class="tt-color-input" value="#e8e6f0" onchange="xCmd('foreColor',this.value)" title="Text color">
    <div class="tt-sep"></div>
    <button class="tt-btn" onmousedown="event.preventDefault();xCmd('insertUnorderedList')" title="Bullets">• ≡</button>
    <div class="tt-sep"></div>
    <button class="tt-btn tt-al" onmousedown="event.preventDefault();xCmd('justifyLeft')" title="Left">☰⫷</button>
    <button class="tt-btn tt-al" onmousedown="event.preventDefault();xCmd('justifyCenter')" title="Center">☰⫿</button>
    <button class="tt-btn tt-al" onmousedown="event.preventDefault();xCmd('justifyRight')" title="Right">⫸☰</button>
  `;
  return tb;
}

function xCmd(cmd,val) { document.execCommand(cmd,false,val||null); updateTbState(); }
function updateTbState() {
  document.querySelectorAll('.tt-btn').forEach(b=>{
    const t=b.getAttribute('title')||'';
    if(t==='Bold') b.classList.toggle('active',document.queryCommandState('bold'));
    if(t==='Italic') b.classList.toggle('active',document.queryCommandState('italic'));
    if(t==='Underline') b.classList.toggle('active',document.queryCommandState('underline'));
  });
}

// ═══════ STYLE PANEL ═══════
function mkStylePanel(idx,el) {
  const p=document.createElement('div'); p.className='style-panel'; p.id=`sp_${idx}`;
  p.innerHTML=`
    <span class="sp-label">Border</span>
    <input type="color" class="sp-color-input" value="${el.borderColor||'#7c6cf0'}" onchange="setBorderColor(${idx},this.value)">
    <select class="sp-select" onchange="setBorderWidth(${idx},this.value)">
      <option value="0" ${(!el.borderWidth)?'selected':''}>0</option>
      <option value="1" ${el.borderWidth===1?'selected':''}>1</option>
      <option value="2" ${el.borderWidth===2?'selected':''}>2</option>
      <option value="3" ${el.borderWidth===3?'selected':''}>3</option>
      <option value="4" ${el.borderWidth===4?'selected':''}>4</option>
    </select>
    <div class="tt-sep"></div>
    <span class="sp-label">Fill</span>
    <input type="color" class="sp-color-input" value="${rgbaToHex(el.bgColor)||'#22222e'}" onchange="setBgColor(${idx},this.value)">
    <select class="sp-select" onchange="setBgAlpha(${idx},this.value)">
      <option value="0" ${(el._bgAlpha||0)===0?'selected':''}>0%</option>
      <option value="0.08" ${el._bgAlpha===0.08?'selected':''}>8%</option>
      <option value="0.15" ${el._bgAlpha===0.15?'selected':''}>15%</option>
      <option value="0.25" ${el._bgAlpha===0.25?'selected':''}>25%</option>
      <option value="0.4" ${el._bgAlpha===0.4?'selected':''}>40%</option>
      <option value="0.6" ${el._bgAlpha===0.6?'selected':''}>60%</option>
      <option value="0.85" ${el._bgAlpha===0.85?'selected':''}>85%</option>
    </select>
  `;
  return p;
}
function setBorderColor(i,c) { const el=slides[currentSlideIdx].elements[i]; el.borderColor=c; if(!el.borderWidth) el.borderWidth=2; applyBoxStyle(i); }
function setBorderWidth(i,v) { const el=slides[currentSlideIdx].elements[i]; el.borderWidth=parseInt(v); if(!parseInt(v)) el.borderColor=''; applyBoxStyle(i); }
function setBgColor(i,hex) { const el=slides[currentSlideIdx].elements[i]; el._bgHex=hex; const a=el._bgAlpha||0.15; if(!el._bgAlpha) el._bgAlpha=0.15; el.bgColor=hexToRgba(hex,el._bgAlpha); applyBoxStyle(i); }
function setBgAlpha(i,a) { const el=slides[currentSlideIdx].elements[i]; el._bgAlpha=parseFloat(a); const hex=el._bgHex||'#22222e'; el.bgColor=parseFloat(a)===0?'':hexToRgba(hex,parseFloat(a)); applyBoxStyle(i); }
function applyBoxStyle(i) {
  const el=slides[currentSlideIdx].elements[i];
  const box=document.querySelector(`[data-el-idx="${i}"] .text-element-box`);
  if(!box) return;
  box.style.border=(el.borderColor&&el.borderWidth)?`${el.borderWidth}px solid ${el.borderColor}`:'none';
  box.style.background=el.bgColor||'transparent';
}

// ═══════ DRAG & RESIZE ═══════
function selectEl(idx) { if(selectedElIdx!==idx){ persistAll(); selectedElIdx=idx; renderSlide(); } }
function startDrag(e,idx) {
  const el=slides[currentSlideIdx].elements[idx];
  const canvas=document.getElementById('slideCanvas');
  const rect=canvas.getBoundingClientRect();
  const ox=e.clientX-rect.left-el.x, oy=e.clientY-rect.top-el.y;
  const wr=document.querySelector(`[data-el-idx="${idx}"]`);
  if(wr) wr.classList.add('dragging-el');
  const onMove=(ev)=>{ el.x=Math.round(Math.max(0,Math.min(960-el.w,ev.clientX-rect.left-ox))); el.y=Math.round(Math.max(0,Math.min(540-el.h,ev.clientY-rect.top-oy))); if(wr){wr.style.left=el.x+'px';wr.style.top=el.y+'px';} };
  const onUp=()=>{ if(wr) wr.classList.remove('dragging-el'); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
  document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
}
function startResize(e,idx) {
  e.preventDefault(); e.stopPropagation();
  const el=slides[currentSlideIdx].elements[idx];
  const sW=el.w, sH=el.h, sX=e.clientX, sY=e.clientY;
  const wr=document.querySelector(`[data-el-idx="${idx}"]`);
  const onMove=(ev)=>{ el.w=Math.max(80,Math.min(960-el.x,sW+(ev.clientX-sX))); el.h=Math.max(40,Math.min(540-el.y,sH+(ev.clientY-sY))); if(wr){wr.style.width=el.w+'px';wr.style.height=el.h+'px';} const cmId=`cm_${currentSlideIdx}_${idx}`; if(codeMirrors[cmId]) codeMirrors[cmId].refresh(); };
  const onUp=()=>{ document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
  document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
}

// ═══════ PYTHON ═══════
async function runCell(i) {
  if(!pyReady){toast('Python loading...');return;}
  const el=slides[currentSlideIdx].elements[i];
  const cm=codeMirrors[`cm_${currentSlideIdx}_${i}`]; if(cm) el.code=cm.getValue();
  const btn=document.getElementById(`runBtn_${i}`), out=document.getElementById(`output_${i}`);
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Running';
  out.innerHTML='<span style="color:var(--text-muted)">Executing...</span>';
  try {
    for(const[n,c] of Object.entries(uploadedPyFiles)){const mn=n.replace('.py','');pyodide.runPython(`import types,sys\nmod=types.ModuleType("${mn}")\nexec(${JSON.stringify(c)},mod.__dict__)\nsys.modules["${mn}"]=mod`);}
    pyodide.runPython(`import sys,io\n_buf=io.StringIO()\nsys.stdout=_buf\nsys.stderr=_buf\nplt.close('all')`);
    await pyodide.runPythonAsync(el.code);
    const hasPlot=pyodide.runPython(`len(plt.get_fignums())>0`);
    let html=''; const stdout=pyodide.runPython(`_buf.getvalue()`);
    if(stdout) html+=`<span class="stdout">${escHtml(stdout)}</span>`;
    if(hasPlot){const img=pyodide.runPython(`import base64\nbuf=io.BytesIO()\nplt.savefig(buf,format='png',dpi=120,bbox_inches='tight',facecolor='#1c1c26',edgecolor='none')\nbuf.seek(0)\nbase64.b64encode(buf.read()).decode('utf-8')`);html+=`<img src="data:image/png;base64,${img}">`;pyodide.runPython(`plt.close('all')`);}
    if(!html) html='<span style="color:var(--text-muted)">No output</span>';
    out.innerHTML=html; el.output=html;
    pyodide.runPython(`sys.stdout=sys.__stdout__;sys.stderr=sys.__stderr__`);
  } catch(e){ out.innerHTML=`<span class="error">${escHtml(e.message)}</span>`; el.output=out.innerHTML; try{pyodide.runPython(`sys.stdout=sys.__stdout__;sys.stderr=sys.__stderr__`);}catch(_){} }
  btn.disabled=false; btn.innerHTML='▶ Run';
}
function clearOutput(i) {
  const out=document.getElementById(`output_${i}`);
  if(out) out.innerHTML='<span style="color:var(--text-muted)">Run code to see output...</span>';
  slides[currentSlideIdx].elements[i].output='';
}

// ═══════ CONTEXT MENU ═══════
function showCtxMenu(e,i) { ctxSlideIdx=i; const m=document.getElementById('ctxMenu'); m.style.top=e.clientY+'px'; m.style.left=e.clientX+'px'; m.classList.add('show'); setTimeout(()=>document.addEventListener('click',hideCtx,{once:true}),10); }
function hideCtx() { document.getElementById('ctxMenu').classList.remove('show'); }
function ctxAction(a) { hideCtx(); if(a==='duplicate')duplicateSlide(ctxSlideIdx); else if(a==='hide')toggleHidden(ctxSlideIdx); else if(a==='delete')deleteSlide(ctxSlideIdx); else if(a==='moveUp')moveSlide(ctxSlideIdx,-1); else if(a==='moveDown')moveSlide(ctxSlideIdx,1); }
function changeBg(v) { saveUndo(); slides[currentSlideIdx].bg=v; renderSlide(); }

// ═══════ SHARE ═══════
function openShareModal() { const id=btoa(JSON.stringify({t:document.getElementById('presTitle').value,ts:Date.now()})).slice(0,16); document.getElementById('shareLink').value=`https://slidepy.app/collab/${id}?mode=view`; document.getElementById('shareModal').classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function copyShareLink() { const i=document.getElementById('shareLink'); i.select(); navigator.clipboard.writeText(i.value).then(()=>toast('Link copied!')); }

// ═══════ UPLOAD ═══════
function openUploadModal() { document.getElementById('uploadModal').classList.add('show'); }
function handlePyUpload(e) { Array.from(e.target.files).forEach(f=>{const r=new FileReader();r.onload=(re)=>{uploadedPyFiles[f.name]=re.target.result;renderUploadedFiles();toast(`Uploaded ${f.name}`);};r.readAsText(f);}); e.target.value=''; }
function renderUploadedFiles() { const l=document.getElementById('uploadedFilesList'); l.innerHTML=''; Object.keys(uploadedPyFiles).forEach(n=>{const d=document.createElement('div');d.className='uploaded-file-item';d.innerHTML=`<span>🐍 ${escHtml(n)}</span><button onclick="removePyFile('${escHtml(n)}')">✕</button>`;l.appendChild(d);}); }
function removePyFile(n) { delete uploadedPyFiles[n]; renderUploadedFiles(); toast(`Removed ${n}`); }
function setupDropZone() { const z=document.getElementById('uploadZone'); if(!z)return; z.ondragover=(e)=>{e.preventDefault();z.style.borderColor='var(--accent)';}; z.ondragleave=()=>{z.style.borderColor='';}; z.ondrop=(e)=>{e.preventDefault();z.style.borderColor='';Array.from(e.dataTransfer.files).filter(f=>f.name.endsWith('.py')).forEach(f=>{const r=new FileReader();r.onload=(re)=>{uploadedPyFiles[f.name]=re.target.result;renderUploadedFiles();toast(`Uploaded ${f.name}`);};r.readAsText(f);});}; }

// ═══════ PRESENT ═══════
let presentIdx=0;
function startPresentation() { persistAll(); presentIdx=0; while(presentIdx<slides.length&&slides[presentIdx].hidden) presentIdx++; if(presentIdx>=slides.length){toast('No visible slides!');return;} document.body.classList.add('presenting'); document.getElementById('presentNav').style.display='flex'; currentSlideIdx=presentIdx; selectedElIdx=-1; renderSlide(); updatePC(); document.addEventListener('keydown',pkh); }
function stopPresentation() { document.body.classList.remove('presenting'); document.getElementById('presentNav').style.display='none'; document.removeEventListener('keydown',pkh); renderSlide(); }
function presentNext() { let n=presentIdx+1; while(n<slides.length&&slides[n].hidden)n++; if(n>=slides.length)return; presentIdx=n; currentSlideIdx=presentIdx; renderSlide(); updatePC(); }
function presentPrev() { let p=presentIdx-1; while(p>=0&&slides[p].hidden)p--; if(p<0)return; presentIdx=p; currentSlideIdx=presentIdx; renderSlide(); updatePC(); }
function pkh(e) { if(e.key==='ArrowRight'||e.key===' ')presentNext(); else if(e.key==='ArrowLeft')presentPrev(); else if(e.key==='Escape')stopPresentation(); }
function updatePC() { const v=slides.filter(s=>!s.hidden); document.getElementById('presentCounter').textContent=`${v.indexOf(slides[presentIdx])+1} / ${v.length}`; }

// ═══════ SAVE/LOAD ═══════
function exportJSON() { persistAll(); const d={title:document.getElementById('presTitle').value,slides,uploadedPyFiles}; const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=(d.title||'pres')+'.slidepy.json'; a.click(); URL.revokeObjectURL(u); toast('Saved!'); }
function triggerLoad() { document.getElementById('loadInput').click(); }
function importJSON(e) { const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=(re)=>{try{const d=JSON.parse(re.target.result);slides=d.slides||[];uploadedPyFiles=d.uploadedPyFiles||{};document.getElementById('presTitle').value=d.title||'Untitled';currentSlideIdx=0;selectedElIdx=-1;renderSidebar();renderSlide();renderUploadedFiles();toast('Loaded!');}catch(err){toast('Failed to load');}}; r.readAsText(f); e.target.value=''; }

// ═══════ UTILS ═══════
function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function isLightColor(hex) { const c=hex.replace('#',''); return(parseInt(c.substr(0,2),16)*299+parseInt(c.substr(2,2),16)*587+parseInt(c.substr(4,2),16)*114)/1000>180; }
function toast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function hexToRgba(h,a) { const c=h.replace('#',''); return`rgba(${parseInt(c.substr(0,2),16)},${parseInt(c.substr(2,2),16)},${parseInt(c.substr(4,2),16)},${a})`; }
function rgbaToHex(r) { if(!r)return''; const m=r.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/); if(!m)return r; return'#'+[m[1],m[2],m[3]].map(x=>parseInt(x).toString(16).padStart(2,'0')).join(''); }

document.addEventListener('keydown',(e)=>{
  if(document.body.classList.contains('presenting'))return;
  if(e.ctrlKey||e.metaKey){ if(e.key==='z'&&!e.shiftKey){e.preventDefault();undo();} if(e.key==='z'&&e.shiftKey){e.preventDefault();redo();} if(e.key==='y'){e.preventDefault();redo();} if(e.key==='s'){e.preventDefault();exportJSON();} }
  if((e.key==='Delete'||e.key==='Backspace')&&selectedElIdx!==-1){ const a=document.activeElement; if(a&&(a.contentEditable==='true'||a.tagName==='INPUT'||a.tagName==='TEXTAREA'||a.closest('.CodeMirror')))return; e.preventDefault(); removeElement(selectedElIdx); }
});

init();
</script>
